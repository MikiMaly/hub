name = "mmaly-hub"
compatibility_date = "2024-09-23"
pages_build_output_dir = "dist"

[vars]
# Non-secret variables here
# HUB_PASSWORD is set as a Secret in Cloudflare Pages dashboard

# KV namespace pro invite kódy
# POZOR: ID musíš vyplnit po vytvoření KV namespace v Cloudflare dashboard
# Dashboard → Workers & Pages → KV → Create namespace "HUB_INVITES"
# Pak zkopíruj ID sem a nastav binding v Pages projektu jako "INVITES"
[[kv_namespaces]]
binding = "INVITES"
id = "816e5069367440448a280e591a827046"

# KV namespace pro Polymarket bot signály
# POZOR: vytvoř namespace v Cloudflare dashboard → Workers & Pages → KV → "HUB_SIGNALS"
# Pak zkopíruj ID sem a nastav binding v Pages projektu jako "SIGNALS"
# Nastav secret BOT_SECRET v Pages projektu (libovolný dlouhý řetězec)
[[kv_namespaces]]
binding = "SIGNALS"
id = "8dc4d9cbf2054be280041a33f2cd785e"

# D1 binding pro gekos sub-app (sdílí databázi s gekos-cron Workerem)
[[d1_databases]]
binding = "DB"
database_name = "gekos"
database_id = "259436bf-1981-400d-9095-672ce0f429e5"
migrations_dir = "gekos/migrations"
