<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>mmaly.cz</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>
  <header class="header">
    <div class="container">
      <a href="/" class="logo">mmaly<span class="logo-dot">.cz</span></a>
      <nav class="nav">
        <a href="https://github.com/MikiMaly" target="_blank" rel="noopener" class="nav-link">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/></svg>
          GitHub
        </a>
        <a href="/login.html" class="nav-link nav-link--lock" id="adminLink">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </a>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="container">
        <div class="hero-content">
          <p class="hero-eyebrow">Michal Malý</p>
          <h1 class="hero-title">Projekty & Appky</h1>
          <p class="hero-subtitle">Kolekce nástrojů, experimentů a webových aplikací.</p>
        </div>
      </div>
    </section>

    <section class="section" id="apps">
      <div class="container">
        <h2 class="section-title">Veřejné appky</h2>
        <div class="grid" id="publicGrid">
          <!-- Cards vloženy JS nebo ručně -->
          <div class="card card--empty">
            <div class="card-icon">+</div>
            <h3 class="card-title">Brzy</h3>
            <p class="card-desc">Appky budou přibývat…</p>
          </div>
        </div>
      </div>
    </section>

    <section class="section section--private" id="privateSection">
      <div class="container">
        <div class="section-header">
          <h2 class="section-title">Privátní</h2>
          <span class="badge">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            Chráněno
          </span>
        </div>
        <div id="privateContent" class="private-locked">
          <div class="lock-prompt">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <p>Tato sekce je chráněná přihlášením.</p>
            <a href="/login.html" class="btn">Přihlásit se</a>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <span class="footer-text">mmaly.cz</span>
      <div class="footer-links">
        <a href="https://github.com/MikiMaly" target="_blank" rel="noopener">GitHub</a>
      </div>
    </div>
  </footer>

  <script src="/js/main.js"></script>
</body>
</html>
