<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Přihlášení — mmaly.cz</title>
  <link rel="icon" type="image/png" href="/assets/favicon.png" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ---- Background effects ---- */
    .login-bg-grid {
      position: fixed; inset: 0;
      background-image: radial-gradient(circle at 1px 1px, rgba(63,185,80,.06) 1px, transparent 0);
      background-size: 40px 40px;
      pointer-events: none; z-index: 0;
    }
    .login-bg-noise {
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.12'/%3E%3C/svg%3E");
      mix-blend-mode: overlay; opacity: 0.4;
      pointer-events: none; z-index: 0;
    }
    .login-orb {
      position: fixed;
      top: 20%; right: 20%;
      width: 380px; height: 380px;
      border-radius: 50%;
      background: rgba(63,185,80,.18);
      filter: blur(100px);
      pointer-events: none; z-index: 0;
      animation: orb-pulse 8s ease-in-out infinite;
    }
    @keyframes orb-pulse {
      0%, 100% { transform: scale(1);   opacity: 0.8; }
      50%       { transform: scale(1.2); opacity: 1;   }
    }

    /* ---- Wrapper ---- */
    .login-page { position: relative; }
    .login-wrapper {
      position: relative; z-index: 1;
      animation: login-fade .5s ease both;
    }
    @keyframes login-fade {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ---- Back link (above card) ---- */
    .login-back--top {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 20px;
      font-size: 14px;
      color: var(--text-muted);
      text-decoration: none;
      transition: color .15s;
    }
    .login-back--top:hover { color: var(--text); text-decoration: none; }

    /* ---- Card ---- */
    .login-card {
      border-radius: 16px;
      position: relative;
      overflow: hidden;
    }
    .login-card::before {
      content: '';
      position: absolute; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence baseFrequency='0.9' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.4'/%3E%3C/svg%3E");
      mix-blend-mode: overlay; opacity: 0.2;
      pointer-events: none; border-radius: inherit;
    }

    /* ---- Shield header ---- */
    .login-shield-wrap { text-align: center; margin-bottom: 28px; }
    .login-shield {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: rgba(63,185,80,.1);
      border: 2px solid rgba(63,185,80,.2);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
      color: var(--accent);
      animation: shield-pop .5s .15s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes shield-pop {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
    .login-title { font-size: 26px; margin-bottom: 6px; }
    .login-sub   { margin-bottom: 0; }

    /* ---- Tabs ---- */
    .login-tabs {
      display: flex; gap: 4px;
      margin-bottom: 24px;
      background: #0d1117;
      border-radius: 8px; padding: 4px;
      border: 1px solid var(--border);
    }
    .login-tab {
      flex: 1; padding: 8px;
      border: none; border-radius: 6px;
      background: transparent;
      color: var(--text-muted);
      font-size: 14px; font-family: inherit;
      cursor: pointer; transition: all .15s;
    }
    .login-tab.active { background: #21262d; color: var(--text); }
    .login-tab:hover:not(.active) { color: var(--text-muted); opacity: .8; }

    /* ---- Password show/hide ---- */
    .field-input-wrap { position: relative; }
    .field-input-wrap .field-input { padding-right: 44px; }
    .field-toggle-pw {
      position: absolute; right: 12px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--text-muted);
      display: flex; align-items: center; justify-content: center;
      padding: 4px;
      transition: color .15s;
    }
    .field-toggle-pw:hover { color: var(--text); }

    /* ---- Secure footer ---- */
    .login-secure {
      display: flex; align-items: center; justify-content: center;
      gap: 6px;
      margin-top: 20px;
      font-size: 13px;
      color: var(--text-muted);
    }
  </style>
</head>
<body class="login-page">
  <div class="login-bg-grid"></div>
  <div class="login-bg-noise"></div>
  <div class="login-orb"></div>

  <div class="login-wrapper">
    <a href="/" class="login-back login-back--top">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Zpět na hlavní stránku
    </a>

    <div class="login-card">
      <div class="login-shield-wrap">
        <div class="login-shield">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
        </div>
        <h1 class="login-title">Privátní sekce</h1>
        <p class="login-sub">Přihlaste se pro přístup k chráněnému obsahu</p>
      </div>

      <div class="login-tabs">
        <button type="button" class="login-tab active" id="tabPassword">Heslo</button>
        <button type="button" class="login-tab" id="tabCode">Pozvánka</button>
      </div>

      <form id="loginForm" class="login-form" novalidate>
        <div class="field" id="fieldPassword">
          <label for="password" class="field-label">Heslo</label>
          <div class="field-input-wrap">
            <input type="password" id="password" name="password" class="field-input"
              placeholder="••••••••" autocomplete="current-password" />
            <button type="button" class="field-toggle-pw" id="togglePw" aria-label="Zobrazit heslo">
              <svg id="eyeOpen" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
              <svg id="eyeClosed" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="field" id="fieldCode" style="display:none">
          <label for="code" class="field-label">Kód pozvánky</label>
          <input type="text" id="code" name="code" class="field-input"
            placeholder="ABCD-EF3G" autocomplete="off" spellcheck="false"
            style="text-transform:uppercase;letter-spacing:2px" />
        </div>
        <div id="loginError" class="login-error" hidden></div>
        <button type="submit" class="btn btn--full" id="submitBtn">Přihlásit se</button>
      </form>
    </div>

    <div class="login-secure">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      Zabezpečeno end-to-end šifrováním
    </div>
  </div>

  <script>
    window._loginTab = 'password';
    function switchTab(tab) {
      window._loginTab = tab;
      document.getElementById('tabPassword').classList.toggle('active', tab === 'password');
      document.getElementById('tabCode').classList.toggle('active', tab === 'code');
      document.getElementById('fieldPassword').style.display = tab === 'password' ? '' : 'none';
      document.getElementById('fieldCode').style.display = tab === 'code' ? '' : 'none';
      document.getElementById('loginError').hidden = true;
    }
    document.getElementById('tabPassword').addEventListener('click', () => switchTab('password'));
    document.getElementById('tabCode').addEventListener('click', () => switchTab('code'));

    document.getElementById('togglePw').addEventListener('click', function () {
      const input = document.getElementById('password');
      const showing = input.type === 'text';
      input.type = showing ? 'password' : 'text';
      document.getElementById('eyeOpen').style.display   = showing ? '' : 'none';
      document.getElementById('eyeClosed').style.display = showing ? 'none' : '';
    });
  </script>
  <script src="/js/login.js"></script>
</body>
</html>
