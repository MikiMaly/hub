<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pozvánky — mmaly.cz</title>
  <link rel="icon" type="image/png" href="/assets/favicon.png" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    .inv-table { width: 100%; border-collapse: collapse; margin-top: 24px; }
    .inv-table th { text-align: left; padding: 8px 12px; font-size: 12px; color: #8b949e;
                    text-transform: uppercase; border-bottom: 1px solid #21262d; }
    .inv-table td { padding: 10px 12px; border-bottom: 1px solid #161b22; font-size: 14px; }
    .inv-code { font-family: 'JetBrains Mono', monospace; color: #58a6ff; letter-spacing: 2px; }
    .inv-del  { background: none; border: 1px solid #f8514933; color: #f85149; border-radius: 6px;
                padding: 4px 10px; font-size: 12px; cursor: pointer; }
    .inv-del:hover { background: #f8514915; }
    .inv-form { display: flex; gap: 12px; margin-top: 32px; align-items: flex-end; }
    .inv-form .field { flex: 1; margin: 0; }
    .inv-empty { color: #8b949e; font-size: 14px; padding: 24px 0; }
  </style>
</head>
<body>
  <header class="header">
    <div class="container">
      <a href="/private/" class="logo">mmaly<span class="logo-dot">.cz</span></a>
      <nav class="nav">
        <a href="/private/" class="nav-link">← Zpět</a>
        <button class="nav-link nav-link--lock" id="logoutBtn" title="Odhlásit se">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="container">
        <div class="hero-content">
          <p class="hero-eyebrow">Admin</p>
          <h1 class="hero-title">Správa pozvánek</h1>
          <p class="hero-subtitle">Vytvárej a spravuj invite kódy pro přístup k privátní sekci.</p>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div id="tableWrap">
          <p class="inv-empty">Načítám…</p>
        </div>

        <div class="inv-form">
          <div class="field">
            <label for="newLabel" class="field-label">Jméno / popis</label>
            <input type="text" id="newLabel" class="field-input" placeholder="např. Kamarád Petr" />
          </div>
          <button class="btn" id="createBtn" onclick="createCode()">+ Vytvořit kód</button>
        </div>
        <div id="createError" class="login-error" hidden></div>
      </div>
    </section>
  </main>

  <script src="/js/main.js"></script>
  <script>
    document.getElementById('logoutBtn').addEventListener('click', () => {
      fetch('/api/logout', { method: 'POST' }).then(() => { window.location.href = '/'; });
    });

    function getAdminPw() {
      const pw = sessionStorage.getItem('adminpw');
      if (pw) return pw;
      const input = prompt('Admin heslo:');
      if (input) sessionStorage.setItem('adminpw', input);
      return input;
    }

    async function loadCodes() {
      const pw = getAdminPw();
      if (!pw) return;
      const res = await fetch(`/api/invite?adminpw=${encodeURIComponent(pw)}`);
      if (res.status === 403) { sessionStorage.removeItem('adminpw'); loadCodes(); return; }
      const codes = await res.json();
      const wrap = document.getElementById('tableWrap');
      if (codes.length === 0) {
        wrap.innerHTML = '<p class="inv-empty">Zatím žádné pozvánky.</p>';
        return;
      }
      wrap.innerHTML = `<table class="inv-table">
        <thead><tr><th>Kód</th><th>Jméno</th><th>Vytvořeno</th><th></th></tr></thead>
        <tbody>${codes.map(c => `
          <tr>
            <td><span class="inv-code">${c.code}</span></td>
            <td>${c.label}</td>
            <td>${c.created}</td>
            <td><button class="inv-del" onclick="deleteCode('${c.code}')">Smazat</button></td>
          </tr>`).join('')}
        </tbody>
      </table>`;
    }

    async function createCode() {
      const pw = getAdminPw();
      const label = document.getElementById('newLabel').value.trim();
      const errEl = document.getElementById('createError');
      const btn = document.getElementById('createBtn');
      if (!label) { errEl.textContent = 'Zadej jméno.'; errEl.hidden = false; return; }
      btn.disabled = true;
      const res = await fetch('/api/invite', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ adminpw: pw, label }),
      });
      btn.disabled = false;
      if (!res.ok) { errEl.textContent = 'Chyba.'; errEl.hidden = false; return; }
      const { code } = await res.json();
      errEl.hidden = true;
      document.getElementById('newLabel').value = '';
      alert(`Kód vytvořen: ${code}`);
      loadCodes();
    }

    async function deleteCode(code) {
      if (!confirm(`Smazat kód ${code}?`)) return;
      const pw = getAdminPw();
      await fetch('/api/invite', {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ adminpw: pw, code }),
      });
      loadCodes();
    }

    loadCodes();
  </script>
</body>
</html>
